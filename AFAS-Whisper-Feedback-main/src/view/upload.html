<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Audio</title>
  <style>
		* {box-sizing: border-box;}

		body { 
		  margin: 0;
		  font-family: Arial, Helvetica, sans-serif;
		}

		.header {
		  overflow: hidden;
		  background-color: #f1f1f1;
		  padding: 20px 10px;
		}

		.header a {
		  float: left;
		  color: black;
		  text-align: center;
		  padding: 12px;
		  text-decoration: none;
		  font-size: 18px; 
		  line-height: 25px;
		  border-radius: 4px;
		}

		.header a.logo {
		  font-size: 25px;
		  font-weight: bold;
		}

		.header a:hover {
		  background-color: #ddd;
		  color: black;
		}

		.header a.log_in {
		  background-color: dodgerblue;
		  color: white;
		}

		.header-right {
		  float: right;
		}

		@media screen and (max-width: 500px) {
		  .header a {
			float: none;
			display: block;
			text-align: left;
		  }
		  
		  .header-right {
			float: none;
		  }
		}
	</style>
</head>
<body>

<div class="header">
	 <a href="/view/homepage.html" class="logo">AFAS</a>
	 <div class="header-right">
	   <a href="/view/profile.html" class="log_in">Profile</a>
	   <a href="#about">About</a>
	 </div>
	</div>

<h2>Upload Audio for Speaking Analysis</h2>

<input type="file" id="audioFile" accept="audio/*">
<button id="uploadBtn" type="button" onclick="uploadAudio()">Submit</button>

<h3>Speak directly</h3>

<button id="startBtn">Start recording</button>
  <button id="stopBtn" disabled>Stop recording</button>
  <button id="sendBtn" disabled>Upload recording</button>

  <audio id="player" controls></audio>
  <div id="status">Idle.</div>

<p id="statusText" style="display:none; color:blue; margin-top:10px; font-weight:bold;"></p>

<script src="/api/v1/view-config.js"></script>
  <script src="/view/auth.js"></script>
  <script>
    loadUser();
    function uploadAudio() {
      const fileInput = document.getElementById("audioFile");
      const file = fileInput.files[0];
      const statusText = document.getElementById("statusText");
      const uploadBtn = document.getElementById("uploadBtn");

      if (!file) {
        alert("Please choose an audio file.");
        return;
      }

      statusText.style.display = "block";
      statusText.innerText = "Uploading audio...";
      uploadBtn.disabled = true;

      const formData = new FormData();
      formData.append("file", file);

      setTimeout(function () {
        fetch(BACKEND_BASE_URL + "/api/v1/upload-audio", {
          method: "POST",
          body: formData,
		  headers: {
		    "Authorization": "Bearer " + token
		  }
        })
        .then(function(response) {
          if (!response.ok) {
            return response.text().then(function(text) {
              throw new Error(text);
            });
          }
          return response.json();
        })
        .then(function(uploadResult) {
          statusText.innerText = "Processing...";

          const submitPayload = {
            user_id: 0,
            audio_path: uploadResult.audio_path,
            asr_type: "whisper"
          };

          return fetch(BACKEND_BASE_URL + "/api/v1/submit/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
			  "Authorization": "Bearer " + token
            },
            body: JSON.stringify(submitPayload)
          });
        })
        .then(function(response) {
          if (!response.ok) {
            return response.text().then(function(text) {
              throw new Error(text);
            });
          }
          return response.json();
        })
        .then(function(submitResult) {
          localStorage.setItem("submit_id", submitResult.id);

          statusText.innerText = "Submit success";

          setTimeout(function() {
            window.location.href = "/view/transcript.html";
          }, 2000);
        })
        .catch(function(error) {
          statusText.innerText = "Error: " + error.message;
          uploadBtn.disabled = false;
        });
      }, 50);
    }
	
	const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");
    const player = document.getElementById("player");

    let mediaRecorder = null;
    let chunks = [];
    let audioBlob = null;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    startBtn.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const options = MediaRecorder.isTypeSupported("audio/mp3")
          ? { mimeType: "audio/mp3" }
          : {};

        mediaRecorder = new MediaRecorder(stream, options);
        chunks = [];
        audioBlob = null;
        player.src = "";

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            chunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/mp3" });
          const audioUrl = URL.createObjectURL(audioBlob);
          player.src = audioUrl;
          sendBtn.disabled = false;
          setStatus(`Recording stopped. Ready to upload.\nBlob size: ${audioBlob.size} bytes`);
        };

        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        sendBtn.disabled = true;
        setStatus("Recording... speak now.");
      } catch (err) {
        console.error(err);
        setStatus("Could not start recording: " + err.message);
      }
    });

    stopBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus("Stopping recording...");
      }
    });

    sendBtn.addEventListener("click", async () => {
      if (!audioBlob) {
        setStatus("No recording available.");
        return;
      }

        setStatus("Uploading...");

        const formData = new FormData();

        // The field name "file" must match FastAPI: file: UploadFile = File(...)
        const fileName = audioBlob.type.includes("mp3") ? "speech.mp3" : "speech.wav";
        formData.append("file", new File([audioBlob], fileName, { type: audioBlob.type }));

        // Optional extra fields:
        // formData.append("user_id", "123");
        // formData.append("note", "speech recording");

        setTimeout(function () {
        fetch(BACKEND_BASE_URL + "/api/v1/upload-audio", {
          method: "POST",
          body: formData,
		  headers: {
		    "Authorization": "Bearer " + token
		  }
        })
        .then(function(response) {
          if (!response.ok) {
            return response.text().then(function(text) {
              throw new Error(text);
            });
          }
          return response.json();
        })
        .then(function(uploadResult) {
          statusText.innerText = "Processing...";

          const submitPayload = {
            user_id: 0,
            audio_path: uploadResult.audio_path,
            asr_type: "whisper"
          };

          return fetch(BACKEND_BASE_URL + "/api/v1/submit/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
			  "Authorization": "Bearer " + token
            },
            body: JSON.stringify(submitPayload)
          });
        })
        .then(function(response) {
          if (!response.ok) {
            return response.text().then(function(text) {
              throw new Error(text);
            });
          }
          return response.json();
        })
        .then(function(submitResult) {
          localStorage.setItem("submit_id", submitResult.id);

          statusText.innerText = "Submit success";

          setTimeout(function() {
            window.location.href = "/view/transcript.html";
          }, 2000);
        })
        .catch(function(error) {
          statusText.innerText = "Error: " + error.message;
          uploadBtn.disabled = false;
        });
      }, 50);
    });
</script>

</body>
</html>
