<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Audio</title>
</head>
<body>

<h2>Upload Audio for Speaking Analysis</h2>

<input type="file" id="audioFile" accept="audio/*">
<button onclick="uploadAudio()">Submit</button>

<script>

function uploadAudio() {

  const fileInput = document.getElementById("audioFile");
  const file = fileInput.files[0];

  if (!file) {
    alert("Please choose an audio file.");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  fetch("http://127.0.0.1:8100/api/v1/upload-audio", {
    method: "POST",
    body: formData
  })
  .then(function(response) {

    if (!response.ok) {
      return response.text().then(function(text){
        throw new Error(text);
      });
    }

    return response.json();

  })
  .then(function(uploadResult){

    const submitPayload = {
      user_id: 1,
      audio_path: uploadResult.audio_path,
      asr_type: "whisper"
    };

    return fetch("http://127.0.0.1:8100/api/v1/submit/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(submitPayload)
    });

  })
  .then(function(response){

    if (!response.ok) {
      return response.text().then(function(text){
        throw new Error(text);
      });
    }

    return response.json();

  })
  .then(function(submitResult){

    localStorage.setItem("submit_id", submitResult.id);

    alert("Submit success");

    window.location.href = "/view/transcript.html";

  })
  .catch(function(error){

    alert("Error: " + error.message);

  });

}

</script>

</body>
</html>
