<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Upload Audio</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            overflow: hidden;
            background-color: #f1f1f1;
            padding: 20px 10px;
        }

            .header a {
                float: left;
                color: black;
                text-align: center;
                padding: 12px;
                text-decoration: none;
                font-size: 18px;
                line-height: 25px;
                border-radius: 4px;
            }

                .header a.logo {
                    font-size: 25px;
                    font-weight: bold;
                }

                .header a:hover {
                    background-color: #ddd;
                    color: black;
                }

                .header a.log_in {
                    background-color: dodgerblue;
                    color: white;
                }

        .header-right {
            float: right;
        }

        @media screen and (max-width: 500px) {
            .header a {
                float: none;
                display: block;
                text-align: left;
            }

            .header-right {
                float: none;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="/view/homepage.html" class="logo">AFAS</a>
        <div class="header-right">
            <a href="/view/profile.html" class="log_in">Profile</a>
            <a href="#about">About</a>
        </div>
    </div>

    <h1>Answer the question</h1>
    <button id="ansq_button" style="display:none" onclick="showQuestion()">Click here to see get a random question</button>

    <h2 id="ques" style="display:none"></h2>
    <select id="voice_select" style="display:none"></select>
    <button id="play" style="display:none" onclick="speak()">Play</button>
    <button id="ansBtn" style="display:none" onclick="goToUpload()">Answer</button>

    <script src="/api/v1/view-config.js"></script>
    <script src="/view/auth.js"></script>
    <script>
        loadUser();
        const questions = [
            "What do you think about the IELTS? What is good about the test? What can be improved?",
            "What do you know about Antartica? Tell me about its geography, history.",
            "What are the advantages and disavantages of taking up a new hobby?"
        ];

        const ansqBtn = document.getElementById("ansq_button");
        const ques = document.getElementById("ques");
        const ansBtn = document.getElementById("ansBtn");
        const voiceSelect = document.getElementById("voice_select");
        const playBtn = document.getElementById("play");

        const synth = window.speechSynthesis;

        let voices = [];

        function populateVoiceList() {
            voices = synth.getVoices().sort(function (a, b) {
                const aname = a.name.toUpperCase();
                const bname = b.name.toUpperCase();

                if (aname < bname) {
                    return -1;
                } else if (aname == bname) {
                    return 0;
                } else {
                    return +1;
                }
            });
            const selectedIndex =
                voiceSelect.selectedIndex < 0 ? 0 : voiceSelect.selectedIndex;
            voiceSelect.innerHTML = "";

            for (let i = 0; i < voices.length; i++) {
                const option = document.createElement("option");
                option.textContent = `${voices[i].name} (${voices[i].lang})`;

                if (voices[i].default) {
                    option.textContent += " -- DEFAULT";
                }

                option.setAttribute("data-lang", voices[i].lang);
                option.setAttribute("data-name", voices[i].name);
                voiceSelect.appendChild(option);
            }
            voiceSelect.selectedIndex = selectedIndex;
        }


        function speak() {
            if (synth.speaking) {
                console.error("speechSynthesis.speaking");
                return;
            }

            let ques_id = JSON.parse(localStorage.getItem("ques_id"));

            if (ques_id) {
                const utterThis = new SpeechSynthesisUtterance(questions[ques_id]);

                utterThis.onend = function (event) {
                    console.log("SpeechSynthesisUtterance.onend");
                };

                utterThis.onerror = function (event) {
                    console.error("SpeechSynthesisUtterance.onerror");
                };

                const selectedOption =
                    voiceSelect.selectedOptions[0].getAttribute("data-name");

                for (let i = 0; i < voices.length; i++) {
                    if (voices[i].name === selectedOption) {
                        utterThis.voice = voices[i];
                        break;
                    }
                }
                synth.speak(utterThis);
            }
        }

        function showQuestion() {

            let ques_id = JSON.parse(localStorage.getItem("ques_id"));
            if (!ques_id) {
                ques_id = Math.floor(Math.random() * questions.length);
                localStorage.setItem("ques_id", JSON.stringify(ques_id));
            }

            try {
                if (!Number.isInteger(ques_id) || ques_id < 0 || ques_id > questions.length) {
                    throw TypeError("ques_id is of wrong type");
                }
                ansBtn.style.display = "inline";
                ques.style.display = "inline";
                ques.innerText = "Question:" + questions[ques_id];
                ansqBtn.style.display = "none";

                populateVoiceList();

                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = populateVoiceList;
                }

                voiceSelect.style.display = "inline";
                playBtn.style.display = "inline";
            }
            catch (err) {
                console.error(err);
                if (err.name == "TypeError") {
                    localStorage.removeItem("ques_id");
                    window.location.href = "/view/answer_question2.html";
                }
            }
        }

        function loadQuestion() {
            ques_id = JSON.parse(localStorage.getItem("ques_id"));
            if (!ques_id) {
                ansqBtn.style.display = "inline";
            }
            else {
                showQuestion();
            }
        }

        function goToUpload() {
            window.location.href = "/view/upload.html";
        }

        loadQuestion();
    </script>
    
</body>
</html>
