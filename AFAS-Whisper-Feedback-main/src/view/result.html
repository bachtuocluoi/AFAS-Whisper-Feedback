<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Speaking Result</title>
</head>
<body>

  <h2>Speaking Analysis Result</h2>

  <h3>Fluency</h3>
  <div id="fluency">Loading...</div>

  <h3>Lexical</h3>
  <div id="lexical">Loading...</div>

  <h3>Pronunciation</h3>
  <div id="pronunciation">Loading...</div>

  <h3>Feedback</h3>
  <div id="feedback">Loading...</div>

  <br>
  <button onclick="window.location.href='/view/transcript.html'">Back to Transcript</button>
  <button onclick="goBackUpload()">Upload Another Audio</button>

  <script>
    async function loadResult() {
      const submit_id = localStorage.getItem("submit_id");

      if (!submit_id) {
        alert("No submit_id found. Please upload audio first.");
        window.location.href = "/view/upload.html";
        return;
      }

      try {
        // Fluency
        let f = await fetch(`http://127.0.0.1:8001/api/v1/fluency/${submit_id}`);
        if (f.ok) {
          let fluency = await f.json();
          document.getElementById("fluency").innerHTML =
            `Speed Rate: ${fluency.speed_rate} <br>
             Pause Ratio: ${fluency.pause_ratio}`;
        } else {
          document.getElementById("fluency").innerHTML = "No fluency data.";
        }

        // Lexical
        let l = await fetch(`http://127.0.0.1:8001/api/v1/lexical/${submit_id}`);
        if (l.ok) {
          let lexical = await l.json();
          document.getElementById("lexical").innerHTML =
            `TTR: ${lexical.ttr} <br>
             MTTR: ${lexical.mttr}`;
        } else {
          document.getElementById("lexical").innerHTML = "No lexical data.";
        }

        // Pronunciation
        let p = await fetch(`http://127.0.0.1:8001/api/v1/pronunciation/${submit_id}`);
        if (p.ok) {
          let pro = await p.json();
          document.getElementById("pronunciation").innerHTML =
            `85-95%: ${pro.score_85_95} <br>
             95-100%: ${pro.score_95_100}`;
        } else {
          document.getElementById("pronunciation").innerHTML = "No pronunciation data.";
        }

        // Feedback
        let fb = await fetch(`http://127.0.0.1:8001/api/v1/feedback/${submit_id}`);
        if (fb.ok) {
          let feedback = await fb.json();
          document.getElementById("feedback").innerHTML = feedback.feedback;
        } else {
          document.getElementById("feedback").innerHTML = "No feedback data.";
        }

      } catch (error) {
        console.error(error);
        alert("Error loading result.");
      }
    }

    function goBackUpload() {
      localStorage.removeItem("submit_id");
      localStorage.removeItem("audio_path");
      window.location.href = "/view/upload.html";
    }

    loadResult();
  </script>

</body>
</html>
