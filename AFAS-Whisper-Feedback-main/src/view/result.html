<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Speaking Result</title>
</head>
<body>

<h2>Speaking Analysis Result</h2>

<h3>Fluency</h3>
<div id="fluency">Loading...</div>

<h3>Lexical</h3>
<div id="lexical">Loading...</div>

<h3>Pronunciation</h3>
<div id="pronunciation">Loading...</div>

<h3>Feedback</h3>
<div id="feedback">Loading...</div>

<br>

<button onclick="window.location.href='/view/transcript.html'">
Back to Transcript
</button>

<button onclick="goBackUpload()">
Upload Another Audio
</button>

<script>

function loadResult() {
  const submit_id = localStorage.getItem("submit_id");

  if (!submit_id) {
    alert("No submit_id found");
    window.location.href = "/view/upload.html";
    return;
  }

  // Fluency
  fetch("http://127.0.0.1:8002/api/v1/fluency/" + submit_id)
    .then(function(res) {
      if (!res.ok) {
        throw new Error("No fluency data");
      }
      return res.json();
    })
    .then(function(data) {
      console.log("fluency:", data);
      document.getElementById("fluency").innerHTML =
        "Speed Rate: " + (data.speed_rate ?? "N/A") + "<br>" +
        "Pause Ratio: " + (data.pause_ratio ?? "N/A");
    })
    .catch(function() {
      document.getElementById("fluency").innerHTML = "No fluency data.";
    });

  // Lexical
  fetch("http://127.0.0.1:8002/api/v1/lexical/" + submit_id)
    .then(function(res) {
      if (!res.ok) {
        throw new Error("No lexical data");
      }
      return res.json();
    })
    .then(function(data) {
      console.log("lexical:", data);
      document.getElementById("lexical").innerHTML =
        "TTR: " + (data.ttr ?? "N/A") + "<br>" +
        "MTTR: " + (data.mttr ?? "N/A");
    })
    .catch(function() {
      document.getElementById("lexical").innerHTML = "No lexical data.";
    });

  // Pronunciation
  fetch("http://127.0.0.1:8002/api/v1/pronunciation/" + submit_id)
    .then(function(res) {
      if (!res.ok) {
        throw new Error("No pronunciation data");
      }
      return res.json();
    })
    .then(function(data) {
      console.log("pronunciation:", data);
      document.getElementById("pronunciation").innerHTML =
        "85-95%: " + (data.score_85_95 ?? "N/A") + "<br>" +
        "95-100%: " + (data.score_95_100 ?? "N/A");
    })
    .catch(function() {
      document.getElementById("pronunciation").innerHTML = "No pronunciation data.";
    });

  // Feedback
  fetch("http://127.0.0.1:8002/api/v1/feedback/" + submit_id)
    .then(function(res) {
      if (!res.ok) {
        throw new Error("No feedback data");
      }
      return res.json();
    })
    .then(function(data) {
      console.log("feedback:", data);
      document.getElementById("feedback").innerHTML =
        data.feedback ?? "No feedback data.";
    })
    .catch(function() {
      document.getElementById("feedback").innerHTML = "No feedback data.";
    });
}

function goBackUpload() {
  localStorage.removeItem("submit_id");
  localStorage.removeItem("audio_path");
  window.location.href = "/view/upload.html";
}

loadResult();

</script>

</body>
</html>
