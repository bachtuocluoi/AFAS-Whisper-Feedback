<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AFAS</title>
    <link rel="stylesheet" href="/view/common.css">
    <style>
        .auth-card {
            position: relative;
            z-index: 1;
            width: min(430px, 100%);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-top: 5px solid var(--accent-coral);
            border-radius: 24px;
            background-color: var(--card);
            box-shadow:
                0 16px 38px var(--shadow),
                0 2px 4px rgba(0, 0, 0, 0.03);
        }

        .auth-card .card-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            font-size: 24px;
            background-color: var(--accent-coral);
        }

        .auth-card .badge {
            display: block;
            width: max-content;
            max-width: 100%;
            margin: 0 auto 13px;
            text-align: center;
            font-size: 11px;
        }

        .auth-card h1 {
            text-align: center;
            font-size: 30px;
        }

        .auth-description {
            margin: 11px 0 24px;
            color: var(--muted);
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }

        .auth-button,
        .link-button {
            width: 100%;
        }

        .auth-button {
            margin-top: 22px;
        }

        .link-button {
            margin-top: 11px;
            background-color: var(--accent-purple);
        }

        .footer-note {
            margin: 19px 0 0;
            color: #91a0a4;
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }

        @media screen and (max-width: 600px) {
            .centered-page {
                min-height: calc(100vh - 72px);
                padding: 36px 16px;
            }

            .auth-card {
                padding: 25px 22px;
                border-radius: 21px;
            }
        }
    </style>

    <!-- ANALOGOUS AUTH OVERRIDE START -->
    <style>
        /* Analogous override: teal + soft blue + yellow-green */
        :root {
            --accent-blue: #4f8fb3;
            --accent-blue-dark: #3c7898;
            --accent-blue-soft: #e2f0f6;

            --accent-green: #a3bc58;
            --accent-green-dark: #829c3f;
            --accent-green-soft: #eff5dc;
        }

        .shape-right {
            background-color: var(--accent-blue-soft);
        }

        .shape-bottom {
            background-color: var(--accent-green-soft);
        }

        .auth-card {
            border-top-color: var(--accent-green);
        }

        .auth-card .card-icon {
            background-color: var(--accent-blue);
        }

        label {
            color: var(--accent-blue-dark);
        }

        input {
            border-color: rgba(79, 143, 179, 0.24);
        }

        .auth-button {
            background-color: var(--primary-dark);
        }

        .link-button {
            background-color: var(--accent-blue);
        }
    </style>
    <!-- ANALOGOUS AUTH OVERRIDE END -->

</head>
<body>
    <header class="header">
        <a href="/view/homepage.html" class="logo">AFAS</a>
        <nav class="header-right">
            <a href="/view/homepage.html#about">About</a>
        </nav>
    </header>

    <main class="page-wrapper centered-page">
        <div class="decorative-shape shape-left"></div>
        <div class="decorative-shape shape-right"></div>
        <div class="decorative-shape shape-bottom"></div>

        <section class="auth-card">
            <div class="card-icon">+</div>
            <span class="badge">AI Speaking Feedback System</span>
            <h1>Create Your <span class="highlight">Account</span></h1>

            <p class="auth-description">
                Register for an AFAS account to practise your speaking
                skills and receive automated feedback.
            </p>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="full_name">Full name</label>
                    <input type="text" id="full_name" placeholder="Enter your full name" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                </div>

                <button id="registerButton" class="auth-button coral-button" type="submit">
                    Register
                </button>

                <button class="link-button" type="button" onclick="goToLogin()">
                    Already have an account? Log in
                </button>
            </form>

            <div id="message" class="message" role="alert"></div>

            <p class="footer-note">
                Create an AFAS account to access speaking practice,
                transcripts and automated feedback.
            </p>
        </section>
    </main>

    <script src="/api/v1/view-config.js"></script>
    <script>
        const BACKEND_BASE_URL =
            window.APP_CONFIG?.BACKEND_BASE_URL ||
            "http://127.0.0.1:8100";

        window.addEventListener("DOMContentLoaded", function () {
            const token = localStorage.getItem("access_token");

            if (token) {
                window.location.href = "/view/profile.html";
            }
        });

        document.getElementById("registerForm").addEventListener("submit", function (event) {
            event.preventDefault();
            register();
        });

        function goToLogin() {
            window.location.href = "/view/login.html";
        }

        function showMessage(text, type) {
            const message = document.getElementById("message");
            message.textContent = text;
            message.className = "message " + type;
        }

        async function register() {
            const fullName = document.getElementById("full_name").value.trim();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const button = document.getElementById("registerButton");

            if (!fullName || !username || !password) {
                showMessage("Please enter your full name, username and password.", "error");
                return;
            }

            button.disabled = true;
            button.textContent = "Creating account...";

            try {
                const response = await fetch(BACKEND_BASE_URL + "/api/v1/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        full_name: fullName,
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.detail || "Failed to create account.", "error");
                    return;
                }

                showMessage("Account successfully created. Redirecting to login...", "success");

                setTimeout(function () {
                    window.location.href = "/view/login.html";
                }, 1500);
            } catch (error) {
                showMessage("Cannot connect to the server.", "error");
                console.error(error);
            } finally {
                button.disabled = false;
                button.textContent = "Register";
            }
        }
    </script>
</body>
</html>
