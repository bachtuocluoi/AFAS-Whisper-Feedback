<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Transcript</title>
</head>
<body>

  <h2>Transcript</h2>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Word</th>
        <th>Probability</th>
        <th>Start</th>
        <th>End</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

  <br>
  <button onclick="goToResult()">Go to Result</button>
  <button onclick="goBackUpload()">Upload Another Audio</button>

  <script>
    async function loadTranscript() {
      const submit_id = localStorage.getItem("submit_id");

      if (!submit_id) {
        alert("No submit_id found. Please upload audio first.");
        window.location.href = "/view/upload.html";
        return;
      }

      try {
        const response = await fetch(`http://127.0.0.1:8001/api/v1/transcripts/${submit_id}`);

        if (!response.ok) {
          const raw = await response.text();
          alert("Failed to load transcript: " + raw);
          return;
        }

        const data = await response.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        if (!data || data.length === 0) {
          table.innerHTML = `
            <tr>
              <td colspan="4">No transcript data found.</td>
            </tr>
          `;
          return;
        }

        data.forEach(word => {
          table.innerHTML += `
            <tr>
              <td>${word.word}</td>
              <td>${word.prob}</td>
              <td>${word.start}</td>
              <td>${word.end}</td>
            </tr>
          `;
        });

      } catch (error) {
        console.error(error);
        alert("Error loading transcript.");
      }
    }

    function goToResult() {
      window.location.href = "/view/result.html";
    }

    function goBackUpload() {
      localStorage.removeItem("submit_id");
      localStorage.removeItem("audio_path");
      window.location.href = "/view/upload.html";
    }

    loadTranscript();
  </script>

</body>
</html>
