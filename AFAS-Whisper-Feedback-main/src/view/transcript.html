<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Transcript</title>
</head>
<body>

  <h2>Transcript</h2>

  <div id="transcriptLine" style="font-size: 20px; line-height: 1.8; margin-bottom: 20px;"></div>
  
  <table border="1" cellpadding="8" cellspacing="0">
    <tbody>
      <tr id="rowWord"></tr>
      <tr id="rowProb"></tr>
      <tr id="rowStart"></tr>
      <tr id="rowEnd"></tr>
    </tbody>
  </table>

<br>

<button onclick="goToResult()">Go to Result</button>
<button onclick="goBackUpload()">Upload Another Audio</button>

<script>
  function loadTranscript() {
    const submit_id = localStorage.getItem("submit_id");
  
    if (!submit_id) {
      alert("No submit_id found.");
      window.location.href = "/view/upload.html";
      return;
    }
  
    fetch("http://127.0.0.1:8100/api/v1/transcripts/" + submit_id)
      .then(function(response) {
        if (!response.ok) {
          throw new Error("Failed to load transcript");
        }
        return response.json();
      })
      .then(function(data){

        const rowWord = document.getElementById("rowWord");
        const rowProb = document.getElementById("rowProb");

        rowWord.innerHTML = "<th>Word</th>";
        rowProb.innerHTML = "<th>Probability</th>";


        if (!data || data.length === 0) {
          rowWord.innerHTML += "<td>No data</td>";
          return;
        }

        data.forEach(function(word){

          const isLow = word.prob < 0.5;

          // Word
          rowWord.innerHTML +=
            `<td style="${isLow ? 'color:red;font-weight:bold;' : ''}">
              ${word.word}
            </td>`;

          // Probability
          rowProb.innerHTML +=
            `<td style="${isLow ? 'color:red;font-weight:bold;' : ''}">
              ${word.prob.toFixed(2)}
            </td>`;


        });

        })
      .catch(function(error) {
        alert("Error loading transcript");
        console.error(error);
      });
  }
  
  function goToResult() {
    window.location.href = "/view/result.html";
  }
  
  function goBackUpload() {
    localStorage.removeItem("submit_id");
    window.location.href = "/view/upload.html";
  }
  
  loadTranscript();
  </script>

</body>
</html>
