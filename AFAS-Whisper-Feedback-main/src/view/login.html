<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      width: 340px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .link-btn {
      background: #28a745;
    }

    .link-btn:hover {
      background: #1f7d34;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      word-break: break-word;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Log in</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Log in</button>
    <button class="link-btn" onclick="goToRegister()">Don't have an account yet? Go to register</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    window.onload = function () {
      const token = localStorage.getItem("access_token");
      if (token) {
        window.location.href = "/view/profile.html";
      }
    };

    function goToRegister() {
      window.location.href = "/view/register.html";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      message.textContent = "";
      message.className = "message";

      if (!username || !password) {
        message.textContent = "Please enter username and password.";
        message.classList.add("error");
        return;
      }

      try {
        const response = await fetch("http://127.0.0.1:8100/api/v1/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            password: password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          message.textContent = data.detail || "Wrong username or password.";
          message.classList.add("error");
          return;
        }

        localStorage.setItem("access_token", data.access_token);
        window.location.href = "/view/homepage.html";
      } catch (error) {
        message.textContent = "Cannot connect to server.";
        message.classList.add("error");
        console.error(error);
      }
    }
  </script>
</body>
</html>
