<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8">
	<title>Homepage</title>
	<style>
		* {box-sizing: border-box;}

		body { 
		  margin: 0;
		  font-family: Arial, Helvetica, sans-serif;
		}

		.header {
		  overflow: hidden;
		  background-color: #f1f1f1;
		  padding: 20px 10px;
		}

		.header a {
		  float: left;
		  color: black;
		  text-align: center;
		  padding: 12px;
		  text-decoration: none;
		  font-size: 18px; 
		  line-height: 25px;
		  border-radius: 4px;
		}

		.header a.logo {
		  font-size: 25px;
		  font-weight: bold;
		}

		.header a:hover {
		  background-color: #ddd;
		  color: black;
		}

		.header a.log_in {
		  background-color: dodgerblue;
		  color: white;
		}

		.header-right {
		  float: right;
		}

		@media screen and (max-width: 500px) {
		  .header a {
			float: none;
			display: block;
			text-align: left;
		  }
		  
		  .header-right {
			float: none;
		  }
		}
	</style>
</head>
<body>

	<div class="header">
	  <a class="logo">AFAS</a>
	  <div class="header-right">
		<a id="top-btn" class="log_in">Hello</a>
		<a href="#about">About</a>
	  </div>
	</div>

	<div style="padding-left:20px">
	  <h1>ASR</h1>
	  <button id="low-btn" onclick="redirect()" visibility="hidden">Use the system</button>
	</div>

	<script>
	  async function loadUser() {
		const token = localStorage.getItem("access_token");
		const link = document.getElementById("top-btn");

		if (!token) {
			link.href = "/view/login.html";
			link.innerHTML = "Log in";
		}
		else {
			link.href = "/view/profile.html";
			link.innerHTML=`Profile`;
			document.getElementById("low-btn").style.visibility = "visible";
		}
		return;
	  }
	  function logout() {
		localStorage.removeItem("access_token");
		location.reload();
	  }
	  function redirect() {
		window.location.href = "/view/upload.html";
	  }
	  loadUser();
	</script>

</body>
</html>
